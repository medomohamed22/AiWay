<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AIWay Admin</title>
<script defer src="https://sdk.minepi.com/pi-sdk.js"></script><style>body{font-family:system-ui;background:#09090b;color:#fff;margin:0;padding:24px}.wrap{max-width:900px;margin:auto}.card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px;margin:14px 0}button{background:#7c3aed;color:#fff;border:0;padding:12px 18px;border-radius:10px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.value{font-size:32px;font-weight:800;color:#f59e0b}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #27272a;text-align:right}.error{color:#f87171}</style></head>
<body><main class="wrap"><h1>لوحة إدارة AIWay</h1><div class="card"><p>الدخول محمي بحساب Pi، والصلاحية تُراجع في الخادم عبر <code>ADMIN_PI_UIDS</code>.</p><button id="login" type="button">دخول المدير عبر Pi</button><p id="status"></p></div><section id="dashboard" hidden><div class="grid"><div class="card"><div>المستخدمون</div><div id="users" class="value">0</div></div><div class="card"><div>عمليات التوليد</div><div id="generations" class="value">0</div></div></div><div class="card"><h2>آخر المدفوعات المكتملة</h2><table><thead><tr><th>المبلغ π</th><th>Tokens</th><th>الوقت</th></tr></thead><tbody id="payments"></tbody></table></div></section></main>
<script>'use strict';const status=document.getElementById('status');document.getElementById('login').addEventListener('click',async()=>{try{if(!window.Pi)throw new Error('Pi SDK غير متاح');Pi.init({version:'2.0',sandbox:false});const auth=await Pi.authenticate(['username'],()=>{});if(!auth?.accessToken)throw new Error('فشل التوثيق');const response=await fetch('/api/get-admin-stats',{headers:{Authorization:`Bearer ${auth.accessToken}`,Accept:'application/json'}});const data=await response.json();if(!response.ok)throw new Error(data.error||'غير مصرح');document.getElementById('users').textContent=data.users;document.getElementById('generations').textContent=data.generations;const rows=document.getElementById('payments');rows.replaceChildren();for(const p of data.payments||[]){const tr=document.createElement('tr');for(const v of [p.amount_pi,p.tokens,new Date(p.created_at).toLocaleString('ar-EG')]){const td=document.createElement('td');td.textContent=String(v);tr.append(td)}rows.append(tr)}document.getElementById('dashboard').hidden=false;status.textContent='';}catch(e){status.className='error';status.textContent=e.message;}});</script></body></html>
