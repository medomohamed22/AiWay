<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AIWay Gemini</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <style>
    :root{--bg:#050505;--card:#121212;--border:#27272a;--gold:#f59e0b;--purple:#7c3aed;--text:#fff;--sub:#a1a1aa;--grad:linear-gradient(135deg,#8b5cf6 0%,#f59e0b 100%)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#000;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    .header{height:60px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(5,5,5,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);z-index:10}
    .brand{font-weight:900;font-size:22px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.left{display:flex;gap:8px;align-items:center}.btn{background:var(--card);border:1px solid var(--border);color:#fff;border-radius:18px;padding:9px 12px;font-weight:700;cursor:pointer}.token{color:var(--gold);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
    .modelbar{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;border-bottom:1px solid var(--border);background:#050505}.model{white-space:nowrap;background:#111;border:1px solid var(--border);color:#ddd;border-radius:999px;padding:8px 12px;font-weight:700}.model.active{border-color:var(--purple);background:rgba(124,58,237,.2);color:#fff}.cost{color:var(--gold);font-size:11px;margin-inline-start:5px}
    .chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:16px}.empty{text-align:center;color:#666;margin-top:70px;line-height:1.7}.message{max-width:90%;animation:up .25s ease}.user{align-self:flex-end}.bot{align-self:flex-start}.bubble{padding:14px 16px;border-radius:20px;line-height:1.75;font-size:15px;word-wrap:break-word}.user .bubble{background:linear-gradient(135deg,#4c1d95,#2e1065);border-bottom-left-radius:5px}.bot .bubble{background:#111;border:1px solid var(--border);border-bottom-right-radius:5px}.md pre{background:#0b0b0b;border:1px solid #333;border-radius:10px;padding:12px;overflow:auto;direction:ltr;text-align:left}.md code{font-family:Consolas,monospace}.imgbox{background:#111;border:1px solid var(--border);border-radius:18px;overflow:hidden;max-width:330px}.imgbox img{width:100%;display:block}.download{width:100%;padding:12px;border:0;background:var(--gold);font-weight:800;color:#000;cursor:pointer}.typing{display:flex;gap:5px;padding:16px 18px;background:#111;border:1px solid var(--border);border-radius:20px}.dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1.2s infinite}.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
    .footer{border-top:1px solid var(--border);background:#050505;padding:10px 12px max(10px,env(safe-area-inset-bottom))}.controls{display:flex;gap:8px;margin-bottom:8px}.select{background:#121212;color:#fff;border:1px solid var(--border);border-radius:12px;padding:8px}.inputrow{display:flex;gap:8px;align-items:flex-end}textarea{flex:1;max-height:120px;resize:none;border-radius:24px;border:1px solid var(--border);background:#121212;color:#fff;outline:0;padding:14px 16px;font-size:15px}.send{width:48px;height:48px;border-radius:50%;border:0;background:var(--grad);color:#fff;font-size:20px;font-weight:900;cursor:pointer}.send:disabled{background:#333}.copy{margin-top:8px;font-size:12px;color:#ccc;background:#222;border:0;border-radius:8px;padding:5px 9px;cursor:pointer}@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,80%,100%{transform:scale(0);opacity:.5}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <header class="header"><div class="brand">AIWay</div><div class="left"><button class="btn" id="langBtn">EN</button><button class="btn token"><span id="tokenBalance">999</span> π</button></div></header>
  <div class="modelbar" id="modelbar"></div>
  <main class="chat" id="chat"><div class="empty" id="empty">أهلاً بك في AIWay<br>اختر Gemini Chat أو Gemini Image واكتب ما تريد</div></main>
  <footer class="footer">
    <div class="controls"><select class="select" id="ratio"><option value="1024x1024">1:1</option><option value="768x1344">9:16</option><option value="1344x768">16:9</option><option value="1536x640">21:9</option></select></div>
    <div class="inputrow"><textarea id="prompt" rows="1" placeholder="اسأل أو تخيل أي شيء..." dir="auto"></textarea><button class="send" id="send">➤</button></div>
  </footer>
<script>
const MODELS=[
  {id:'gemini-chat-fast',name:'Gemini Flash',type:'text',cost:1},
  {id:'gemini-chat-pro',name:'Gemini Pro',type:'text',cost:3},
  {id:'gemini-image',name:'Gemini Image',type:'image',cost:5}
];
let currentModel=MODELS[0], lang='ar', chatHistory=[];
const $=id=>document.getElementById(id);
function renderModels(){ $('modelbar').innerHTML=''; MODELS.forEach(m=>{const b=document.createElement('button'); b.className='model'+(m.id===currentModel.id?' active':''); b.innerHTML=`${m.name}<span class="cost">${m.cost}</span>`; b.onclick=()=>{currentModel=m; $('ratio').style.display=m.type==='image'?'block':'none'; renderModels()}; $('modelbar').appendChild(b)}); $('ratio').style.display=currentModel.type==='image'?'block':'none'}
function addMessage(text,type){$('empty').style.display='none'; const d=document.createElement('div'); d.className='message '+type; const safe=type==='bot'?DOMPurify.sanitize(marked.parse(String(text||''),{breaks:true,gfm:true})):String(text||'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s])); d.innerHTML=`<div class="bubble ${type==='bot'?'md':''}">${safe}${type==='bot'?`<br><button class="copy" onclick="copyText(this, ${JSON.stringify(String(text||''))})">نسخ الرد</button>`:''}</div>`; $('chat').appendChild(d); scrollBottom()}
function addImage(url){$('empty').style.display='none'; const d=document.createElement('div'); d.className='message bot'; d.innerHTML=`<div class="imgbox"><img src="${url}" alt="Generated image"><button class="download" onclick="downloadImage('${url}')">تحميل</button></div>`; $('chat').appendChild(d); scrollBottom()}
function loader(){const d=document.createElement('div'); d.className='message bot'; d.id='loader'; d.innerHTML='<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>'; $('chat').appendChild(d); scrollBottom()}
function scrollBottom(){$('chat').scrollTop=$('chat').scrollHeight}
async function copyText(btn,text){await navigator.clipboard.writeText(text); const old=btn.textContent; btn.textContent='تم النسخ ✅'; setTimeout(()=>btn.textContent=old,1500)}
function downloadImage(url){const a=document.createElement('a'); a.href=url; a.download='aiway-gemini-image.png'; document.body.appendChild(a); a.click(); a.remove()}
async function sendPrompt(){const text=$('prompt').value.trim(); if(!text)return; $('prompt').value=''; addMessage(text,'user'); loader(); $('send').disabled=true; try{let width=1024,height=1024; const [w,h]=$('ratio').value.split('x').map(Number); width=w;height=h; const payload={prompt:text,model:currentModel.id,width,height,messages:[...chatHistory,{role:'user',content:text}]}; const res=await fetch('/api/generate-and-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const data=await res.json().catch(()=>({})); $('loader')?.remove(); if(!res.ok) throw new Error(data.error||'Server error'); if(data.reply){addMessage(data.reply,'bot'); chatHistory.push({role:'user',content:text},{role:'assistant',content:data.reply}); chatHistory=chatHistory.slice(-12)} if(data.imageUrl)addImage(data.imageUrl); if(data.newBalance!==undefined)$('tokenBalance').textContent=data.newBalance}catch(e){$('loader')?.remove(); addMessage('⚠️ '+e.message,'bot')} finally{$('send').disabled=false}}
$('send').onclick=sendPrompt; $('prompt').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendPrompt()}}); $('langBtn').onclick=()=>{lang=lang==='ar'?'en':'ar'; document.documentElement.lang=lang; document.documentElement.dir=lang==='ar'?'rtl':'ltr'; $('langBtn').textContent=lang==='ar'?'EN':'AR'; $('prompt').placeholder=lang==='ar'?'اسأل أو تخيل أي شيء...':'Ask or imagine anything...'; $('empty').innerHTML=lang==='ar'?'أهلاً بك في AIWay<br>اختر Gemini Chat أو Gemini Image واكتب ما تريد':'Welcome to AIWay<br>Select Gemini Chat or Gemini Image and start'}; renderModels();
</script>
</body>
</html>
