<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>AIWay</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>

<style>
/* --- تصميم صندوق الكود --- */
.code-wrapper {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    margin: 15px 0;
    overflow: hidden;
    direction: ltr !important;
    text-align: left;
}
.code-header {
    background: #252526;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
}
.code-lang { 
    font-size: 12px; color: #9cdcfe; font-weight: bold; text-transform: uppercase; font-family: monospace;
}
.copy-code-btn {
    background: transparent; border: none; color: #ccc; cursor: pointer;
    font-size: 11px; display: flex; align-items: center; gap: 5px; transition: 0.2s;
}
.copy-code-btn:hover { color: white; }
pre { margin: 0 !important; padding: 12px !important; overflow-x: auto; background: transparent !important; border: none !important; }
code { font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #e5e5e5; }

/* --- Design System & New Colors --- */
:root {
    --bg: #050505; 
    --chat-bg: #000000;
    --card: #121212;
    --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #f59e0b 100%);
    --text-gradient: linear-gradient(135deg, #a78bfa 0%, #fbbf24 100%);
    --pi-purple: #7c3aed;
    --pi-gold: #f59e0b;
    --text-main: #ffffff;
    --text-sub: #a1a1aa;
    --border: #27272a;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--chat-bg); color: var(--text-main);
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    direction: rtl; 
}

/* --- Landing Page --- */
.landing-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; text-align: center;
    transition: opacity 0.5s ease;
    background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
}

.landing-lang-btn {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    font-weight: 700; z-index: 10; backdrop-filter: blur(10px);
}

.landing-logo-text {
    font-size: 64px; font-weight: 900; margin-bottom: 10px;
    background: var(--text-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(124, 58, 237, 0.4)); letter-spacing: -2px;
}

.landing-desc { color: #ccc; margin-bottom: 40px; font-size: 15px; line-height: 1.6; max-width: 300px; }
.features-title { font-size: 14px; color: var(--pi-gold); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.features-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 50px; }

.feature-btn {
    padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    border: none; cursor: default; position: relative; min-width: 110px;
}
.f-images { background: var(--primary-gradient); color: white; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
.f-video { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1); }
.soon-badge { font-size: 9px; background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; position: absolute; bottom: -10px; border: 1px solid #444; }

.pi-login-btn {
    background: var(--primary-gradient); color: white; border: none; padding: 14px 50px; border-radius: 30px;
    font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
    display: flex; align-items: center; gap: 10px; transition: transform 0.2s;
}
.pi-login-btn:active { transform: scale(0.95); }
.pi-login-btn svg { width: 24px; height: 24px; fill: white; }

/* --- Header --- */
.header {
    padding: 10px 16px; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; z-index: 100;
}
.header-title-area { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 12px; transition: 0.2s; }
.header-title-area:active { background: rgba(255,255,255,0.05); }
.header-cost-badge { background: var(--pi-gold); color: #000; font-size: 11px; font-weight: 800; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 5px; }
.header-left { display: flex; gap: 8px; align-items: center; }

.token-btn {
    background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--pi-gold);
    padding: 0 12px; height: 34px; border-radius: 18px; font-size: 12px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: 0.2s;
}
.token-btn:active { transform: scale(0.95); }
.token-icon { width: 14px; height: 14px; fill: currentColor; }
.lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 0 12px; height: 34px; border-radius: 18px; font-size: 11px; font-weight: 600; cursor: pointer; }

/* --- Chat & Content --- */
.chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
.message { display: flex; flex-direction: column; max-width: 90%; animation: slideUp 0.3s ease; }
.message.user { align-self: flex-end; } 
.message.bot { align-self: flex-start; width: 100%; max-width: 85%; }

.msg-bubble {
    padding: 16px 20px; border-radius: 24px; font-size: 15px; line-height: 1.8; word-wrap: break-word;
    display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 100%;
}
.message.user .msg-bubble { background: linear-gradient(135deg, #4c1d95 0%, #2e1065 100%); color: #fff; border: 1px solid rgba(124, 58, 237, 0.3); border-bottom-left-radius: 4px; }
.message.bot .msg-bubble { background: var(--card); border: 1px solid var(--border); color: var(--text-main); border-bottom-right-radius: 4px; }

/* Markdown Customization inside Bubbles */
.markdown-body { font-size: 14px; line-height: 1.7; }
.markdown-body p { margin-bottom: 12px; }
.markdown-body p:last-child { margin-bottom: 0; }
.markdown-body ul, .markdown-body ol { margin-bottom: 12px; padding-inline-start: 20px; }
.markdown-body li { margin-bottom: 5px; }
.markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 700; color: var(--pi-gold); margin-top: 15px; margin-bottom: 8px; font-size: 1.1em; }
.markdown-body :not(pre) > code { background: rgba(255, 255, 255, 0.1); color: #ff79c6; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
.markdown-body strong, .markdown-body b { color: #fff; font-weight: 700; }

.no-token-card {
    background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 20px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.no-token-text { color: #fca5a5; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.buy-now-btn { background: var(--pi-gold); color: black; border: none; padding: 8px 24px; border-radius: 20px; font-weight: 700; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

/* Image Containers & Loaders */
.image-loading-box { width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 20px; background: #111; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.blur-wave { position: absolute; inset: -50%; background: conic-gradient(from 0deg, transparent 0deg, var(--pi-purple) 100deg, transparent 180deg, var(--pi-gold) 260deg, transparent 360deg); filter: blur(40px); opacity: 0.5; animation: rotateWave 4s linear infinite; }
.loading-text { position: relative; z-index: 2; font-weight: 700; font-size: 13px; color: white; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); animation: pulse 1.5s ease-in-out infinite; }
@keyframes rotateWave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

.image-container { position: relative; width: 100%; max-width: 400px; background: #000; border-radius: 12px; overflow: hidden; }
.msg-image { width: 100%; height: auto; display: block; opacity: 0; transition: opacity 0.5s ease-in; }
.msg-image.loaded { opacity: 1; }
.download-bar { padding: 12px; background: #141414; display: flex; justify-content: center; border-top: 1px solid #222; width: 100%; }
.d-btn { background: var(--pi-gold); color: black; border: none; padding: 10px 0; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; width: 100%; transition: 0.2s; }

/* --- Footer --- */
.footer-container { background: #050505; border-top: 1px solid var(--border); padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; position: relative; }
.control-bar { display: flex; gap: 10px; padding: 8px 12px 0 12px; position: relative; }
.footer-btn { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 6px 12px; color: var(--text-sub); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 90px; justify-content: space-between; transition: 0.2s; }
.input-row { display: flex; gap: 8px; padding: 10px 12px; align-items: flex-end; }
.input-box { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 14px 18px; color: white; outline: none; resize: none; max-height: 120px; font-size: 15px; }
.send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-gradient); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-weight: 700; font-size: 12px; }
.send-btn:disabled { background: #333; cursor: not-allowed; }
.countdown-text { color: white; font-size: 10px; text-align: center; line-height: 1; }

/* --- Menus --- */
.model-menu, .aspect-menu-dropdown { background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; display: none; flex-direction: column; gap: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
.model-menu { position: absolute; top: 60px; left: 0; right: 0; z-index: 190; padding: 10px; max-height: 70vh; overflow-y: auto; }
.aspect-menu-dropdown { position: absolute; bottom: 100%; right: 12px; width: 200px; margin-bottom: 8px; padding: 8px; z-index: 200; }
.menu-option { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
.menu-option.active { border-color: var(--pi-purple); background: rgba(124, 58, 237, 0.1); }
.menu-category-title { color: var(--pi-gold); font-size: 11px; font-weight: 800; margin: 10px 5px 5px 5px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
.model-tag { font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700; margin-inline-end: 6px; display: inline-block; }
.tag-img { background: rgba(245, 158, 11, 0.15); color: var(--pi-gold); }
.tag-txt { background: rgba(124, 58, 237, 0.15); color: #a78bfa; }

/* --- Modals --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; }
.modal-window { width: 90%; max-width: 400px; max-height: 80vh; background: #111; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
.modal-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #18181b; }
.buy-grid { padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.buy-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
.buy-card:active { border-color: var(--pi-gold); background: rgba(245, 158, 11, 0.1); }
.buy-info { display: flex; flex-direction: column; gap: 4px; }
.buy-amount { color: var(--text-main); font-weight: 700; font-size: 16px; }
.buy-cost { color: var(--pi-gold); font-size: 13px; font-weight: 600; }
.buy-icon { width: 24px; height: 24px; fill: var(--pi-gold); }

/* --- Gallery --- */
.gallery-grid { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 50px; display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: min-content; gap: 15px; align-content: start; }
.gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1/1; background: #18181b; display: flex; flex-direction: column; }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gallery-actions { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 100%); display: flex; gap: 8px; z-index: 5; backdrop-filter: blur(2px); }
.g-btn { flex: 1; border: none; padding: 8px 0; font-size: 11px; cursor: pointer; color: white; border-radius: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
.g-del { background: rgba(239, 68, 68, 0.6); color: white; border: 1px solid rgba(239, 68, 68, 0.3); }
.g-del:active { background: rgba(239, 68, 68, 0.8); }
.g-down { background: var(--pi-gold); color: black; border: 1px solid var(--pi-gold); }
.g-down:active { opacity: 0.9; }

.dl-help-icon { font-size: 40px; margin-bottom: 10px; }
.dl-help-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--pi-gold); }
.dl-help-text { color: #ccc; text-align: center; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.dl-copy-box { background: rgba(255,255,255,0.1); border: 1px dashed #555; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; color: var(--pi-gold); width: 100%; text-align: center; margin-bottom: 15px; word-break: break-all; }

.chat-loading-bubble { padding: 15px 20px; background: #1e1e1e; border-radius: 20px; border-top-left-radius: 4px; display: inline-flex; align-items: center; gap: 5px; width: fit-content; border: 1px solid var(--border); }
.typing-dot { width: 6px; height: 6px; background: var(--pi-gold); border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

.msg-actions { display: flex; justify-content: flex-end; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
.copy-msg-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.copy-msg-btn:hover { background: rgba(255,255,255,0.2); color: white; }

@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

    <div id="landingPage" class="landing-overlay">
        <button class="landing-lang-btn" onclick="toggleLanguage()" id="landingLangBtn">AR</button>
        <div class="landing-logo-text">AiWay</div>
        <div class="landing-desc" id="txtLandingDesc">Generate professional images using state-of-the-art AI technologies</div>
        
        <div class="features-title" id="txtFeaturesTitle">Site Supports</div>
        <div class="features-container">
            <button class="feature-btn f-images"><span>Ai Images</span></button>
            <button class="feature-btn f-video">
                <span>Ai Video</span>
                <span class="soon-badge" id="txtSoonVideo">Soon</span>
            </button>
            <button class="feature-btn f-images"><span>Ai Chat</span></button>
        </div>

        <button class="pi-login-btn" onclick="authenticatePi()">
            <svg viewBox="0 0 32 32"><path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm-2.5-22h-3v12h3V10zm8 0h-3v12h3V10z"/></svg>
            <span id="txtLogin">Pi Login</span>
        </button>
    </div>

    <div class="header">
        <div class="header-title-area" onclick="toggleModelMenu(event)">
            <div style="font-weight:700; font-size:16px; display:flex; align-items:center;" id="headerModelName">Flux Schnell</div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#777" id="modelChevron" style="transition:0.3s; margin-inline-start:5px;"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
        <div class="header-left">
            <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">AR</button>
            <button class="token-btn" onclick="openBuyModal()">
                <svg class="token-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05 1.18 1.91 2.53 1.91 1.38 0 2.53-.83 2.53-1.94 0-.85-.38-1.55-2.03-1.95l-1.04-.25c-2.31-.55-3.62-1.89-3.62-3.63 0-1.86 1.34-3.2 3.14-3.56V4h2.67v1.9c1.68.39 2.92 1.43 3.08 3.13h-2.01c-.13-.88-.95-1.57-2.19-1.57-1.32 0-2.19.85-2.19 1.83 0 .74.43 1.35 2.17 1.77l.82.2c2.51.6 3.84 1.95 3.84 3.73 0 1.96-1.5 3.33-3.22 3.66z"/></svg>
                <span id="tokenBalance">0</span> π
            </button>
        </div>
    </div>

    <div class="model-menu" id="modelMenu"></div>

    <div class="chat-container" id="chatContainer">
        <div style="text-align:center; color:#555; margin-top:50px;" id="emptyMsg">
            Welcome to AIWay <br> Select a model and imagine
        </div>
    </div>

    <div class="footer-container">
        <div class="control-bar">
            <button class="footer-btn" onclick="openGallery()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4z"/></svg>
                <span id="txtGallery">Gallery</span>
            </button>
            
            <div class="aspect-menu-dropdown" id="aspectMenu"></div>
            <button class="footer-btn" id="aspectTriggerBtn" onclick="toggleAspectMenu(event)">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span id="currentAspectIcon"></span>
                    <span id="currentAspectLabel">1:1</span>
                </div>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="#777"><path d="M7 10l5 5 5-5z"/></svg>
            </button>
        </div>

        <div class="input-row">
            <textarea id="promptInput" class="input-box" rows="1" placeholder="Imagine anything..." dir="auto"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
                <svg id="sendIcon" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                <span id="countdownEl" class="countdown-text" style="display:none;"></span>
            </button>
        </div>
    </div>

    <div id="galleryModal" class="modal-overlay">
        <div class="modal-window" style="height:80%;">
            <div class="modal-header">
                <span style="font-weight:700; color:white;" id="txtGalleryTitle">My Gallery</span>
                <button onclick="document.getElementById('galleryModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <div id="buyModal" class="modal-overlay">
        <div class="modal-window">
            <div class="modal-header">
                <span style="font-weight:700; color:white;" id="txtBuyTitle">Buy Tokens</span>
                <button onclick="document.getElementById('buyModal').style.display='none'" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            <div class="buy-grid" id="buyGrid"></div>
        </div>
    </div>

    <div id="downloadInfoModal" class="modal-overlay">
        <div class="modal-window" style="padding:20px; align-items:center;">
            <div class="dl-help-icon">📋</div>
            <div class="dl-help-title" id="txtDlTitle">Link Copied!</div>

/* =========================

   ========================= */
function safeRemove(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function normalizeMessages(list) {
    return (Array.isArray(list) ? list : [])
        .filter(m => m && (m.role === "user" || m.role === "assistant") && typeof m.content === "string")
        .slice(-12);
}

function copyText(btn, text) {
    const value = String(text || "");
    navigator.clipboard.writeText(value).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = '✅ Copied!';
        setTimeout(() => { btn.innerHTML = originalText; }, 2000);
    }).catch(err => {
        try {
            const ta = document.createElement("textarea");
            ta.value = value;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Copied!';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        } catch {
            alert("Could not copy text.");
        }
    });
}

function copyCodeFromBlock(btn) {
    const wrapper = btn.closest('.code-wrapper');
    if (!wrapper) return;
    const codeElement = wrapper.querySelector('code');
    if (!codeElement) return;
    copyText(btn, codeElement.innerText || codeElement.textContent);
}

// تنظيف وتطهير الروابط لمنع هجمات XSS الاختراقية عبر السمات الخبيثة
function sanitizeUrl(url) {
    const clean = String(url || "").trim();
    if (clean.startsWith("http://") || clean.startsWith("https://")) {
        return clean;
    }
    return "about:blank";
}

/* =========================
   MARKED CUSTOM RENDERER
   ========================= */
const renderer = new marked.Renderer();
renderer.code = function(code, language) {
    const validLang = language || 'plaintext';
    const escapedCode = String(code || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    return `<div class="code-wrapper">
        <div class="code-header">
            <span class="code-lang">${validLang}</span>
            <button class="copy-code-btn" type="button" onclick="copyCodeFromBlock(this)">📋 Copy Code</button>
        </div>
        <pre><code class="language-${validLang}">${escapedCode}</code></pre>
    </div>`;
};

            document.getElementById('landingPage').style.display = 'none';

    const grid = document.getElementById('buyGrid');

    const targets = backendPackages.length > 0 ? backendPackages : [{ id: "pkg_1", usd: 1, tokens: 150 }, { id: "pkg_2", usd: 5, tokens: 750 }, { id: "pkg_3", usd: 10, tokens: 1500 }];

async function buyTokens(pkg, piAmount) {
    if (!piAuthToken || !PiInstance) { alert("Login Required"); return; }
    try {
        // حماية التسعير: نرسل السعر والبيانات كالعادة، ولكن الباك اند سيتحقق بشكل مستقل من الـ packageId ولن يعتمد على مدخلات المتصفح
        const paymentData = {
            amount: parseFloat(piAmount),
            memo: `${pkg.tokens} Tokens - AIWay`,
            metadata: { packageId: pkg.id, type: "tokens" } 
        };
        await PiInstance.createPayment(paymentData, {
           onReadyForServerApproval: async (paymentId) => {
                await fetch('/api/approve', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${piAuthToken}` },
                    body: JSON.stringify({ paymentId }) 
                });
            },
           onReadyForServerCompletion: async (paymentId, txid) => {
                // حماية حقن الأسعار: أرسل الـ معرفات فقط، والباك اند يطابق القيم بناءً على بروتوكول البلوكتشين الرسمي لشبكة Pi
                const res = await fetch('/api/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${piAuthToken}` },
                    body: JSON.stringify({ paymentId, txid })
                });
                if (!res.ok) throw new Error("Completion Verification Failed");
                const data = await res.json();
                document.getElementById('tokenBalance').textContent = data.newBalance;
                document.getElementById('buyModal').style.display = 'none';
                alert(`Tokens loaded successfully!`);
            },
            onCancel: () => { console.log("Payment Cancelled"); },
            onError: (error) => { console.error("Payment Error", error); }
        });
    } catch (e) { console.error(e); alert("Payment Setup Failed"); }
}

function updateCooldownUI() {
    const now = Date.now();
    const btn = document.getElementById('sendBtn');
    const icon = document.getElementById('sendIcon');
    const countEl = document.getElementById('countdownEl');
    if (now < cooldownEndTime) {
        const remaining = Math.ceil((cooldownEndTime - now) / 1000);
        btn.disabled = true; icon.style.display = 'none'; countEl.style.display = 'block';
        countEl.innerText = `${TRANSLATIONS[currentLang].wait}\n${remaining}${TRANSLATIONS[currentLang].sec}`;
        requestAnimationFrame(updateCooldownUI);
    } else {
        btn.disabled = false; icon.style.display = 'block'; countEl.style.display = 'none';
    }
}

function triggerCooldown(seconds) {
    cooldownEndTime = Date.now() + (seconds * 1000);
    updateCooldownUI();
}

async function sendPrompt() {
  if (Date.now() < cooldownEndTime) return;
  
  const input = document.getElementById('promptInput');
  const text = input.value.trim();
  if (!text || !piAuthToken) return;
  
  input.value = '';
  addMessage(text, 'user');
  
  const m = MODELS.find(x => x.id === currentModel) || MODELS[0];
  const isChat = m.type === 'text';
  const loadingId = renderLoader(isChat);
  
  triggerCooldown(5);
  
  try {
    let payload = { prompt: text, model: currentModel };
    
    if (isChat) {
      payload.messages = [...normalizeMessages(chatHistory), { role: "user", content: text }];
    } else {
      payload.width = currentWidth; payload.height = currentHeight;
    }
    
    const response = await fetch('/api/generate-and-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${piAuthToken}` },
      body: JSON.stringify(payload)
    });
    
    const status = response.status;
    let data = {};
    try { data = await response.json(); } catch {}
    
    safeRemove(loadingId);
    
    if (status === 403) {
      if (data?.error === 'INSUFFICIENT_TOKENS') addNoTokenCard();
      else addBotText(`⚠️ ${data?.error || "Forbidden"}`);
      return;
    }
    
    if (status === 429) {
      addBotText(`⚠️ ${TRANSLATIONS[currentLang].rateLimit}`);
      triggerCooldown(25);
      return;
    }
    
    if (!response.ok) {
      addBotText(`⚠️ Error (${status}): ${data?.error || "Server issue"}`);
      return;
    }
    
    if (data?.newBalance !== undefined) {
      document.getElementById('tokenBalance').textContent = data.newBalance;
    }
    
    const reply = data?.reply || data?.text || "";
    const imgUrl = data?.imageUrl || data?.image_url || data?.url || "";
    
    if (reply && reply.trim() !== "") {
      chatHistory.push({ role: "user", content: text });
      chatHistory.push({ role: "assistant", content: reply });
      if (chatHistory.length > 24) chatHistory = chatHistory.slice(-24);
      addBotText(reply);
      return;
    }
    
    if (imgUrl) {
      addBotImage(imgUrl, data?.width, data?.height);
      return;
    }
    
    addBotText("⚠️ System failed to build context response.");
  } catch (error) {
    console.error("Transmission Error:", error);
    triggerCooldown(12);
    safeRemove(loadingId);
    addBotText("⚠️ Network error / Connection timed out.");
  }
}

function addBotText(text) {
    const div = document.createElement('div');
    div.className = 'message bot';

    let dirtyHtml = "";
    try { dirtyHtml = marked.parse(text); } catch (e) { dirtyHtml = text; }
    
    let safeHtml = dirtyHtml;
    if (window.DOMPurify) {
        safeHtml = DOMPurify.sanitize(dirtyHtml);
    }

    div.innerHTML = `
        <div class="msg-bubble">
            <div class="markdown-body">${safeHtml}</div>
            <div class="msg-actions">
                <button class="copy-msg-btn" type="button">${TRANSLATIONS[currentLang].copyReply}</button>
            </div>
        </div>
    `;

    const btn = div.querySelector('.copy-msg-btn');
    if (btn) {
        btn.onclick = () => copyText(btn, text);
    }

    document.getElementById('chatContainer').appendChild(div);
    scrollToBottom();
}

function renderLoader(isChat) {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'loading-' + Date.now();

    if (isChat) {
        div.innerHTML = `<div class="chat-loading-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    } else {
        div.innerHTML = `<div class="image-loading-box"><div class="blur-wave"></div><div class="loading-text">Generating...</div></div>`;
    }

    document.getElementById('chatContainer').appendChild(div);
    scrollToBottom();
    return div.id;
}

function addMessage(content, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-bubble';
    wrapper.textContent = content; // حماية مدمجة ضد هجمات XSS المدخلة من المستخدم
    div.appendChild(wrapper);
    
    document.getElementById('chatContainer').appendChild(div);
    document.getElementById('emptyMsg').style.display = 'none';
    scrollToBottom();
}

function addNoTokenCard() {
    const t = TRANSLATIONS[currentLang];
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `
        <div class="msg-bubble">
            <div class="no-token-card">
                <div class="no-token-text">${t.noTokens}</div>
                <button class="buy-now-btn" onclick="openBuyModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="black"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
                    ${t.buyNow}
                </button>
            </div>
        </div>
    `;
    document.getElementById('chatContainer').appendChild(div);
    scrollToBottom();
}

function addBotImage(url, w, h) {
    const div = document.createElement('div');
    div.className = 'message bot';

    const ww = Number(w) || currentWidth;
    const hh = Number(h) || currentHeight;
    const aspectRatio = ww / hh;
    const safeUrl = sanitizeUrl(url); // حماية الروابط

    div.innerHTML = `
        <div class="msg-bubble">
            <div class="image-container" style="aspect-ratio: ${aspectRatio};">
                <img src="${safeUrl}" class="msg-image" onload="this.classList.add('loaded')">
            </div>
            <div class="download-bar">
                <button class="d-btn" type="button">${TRANSLATIONS[currentLang].download}</button>
            </div>
        </div>
    `;

    const dBtn = div.querySelector('.d-btn');
    if (dBtn) {
        dBtn.onclick = () => forceDownload(safeUrl);
    }

    document.getElementById('chatContainer').appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    const c = document.getElementById('chatContainer');
    c.scrollTop = c.scrollHeight;
}

function forceDownload(url) {
    const downloadUrl = url + "?download=";
    navigator.clipboard.writeText(downloadUrl).then(() => {
        showInfoModal(downloadUrl);
    }).catch(() => {
        try {
            const ta = document.createElement("textarea");
            ta.value = downloadUrl;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showInfoModal(downloadUrl);
        } catch {
            alert("Download ready link: " + downloadUrl);
        }
    });
}

function showInfoModal(link) {
    document.getElementById('dlLinkBox').textContent = link;
    document.getElementById('downloadInfoModal').style.display = 'flex';
}

async function openGallery() {
    if (!piAuthToken) { alert("Login Required"); return; }
    const modal = document.getElementById('galleryModal');
    const grid = document.getElementById('galleryGrid');
    modal.style.display = 'flex';
    grid.innerHTML = '<div style="color:white; text-align:center; grid-column: span 2;">Loading Matrix...</div>';
    try {
        // حماية IDOR: جلب الصور يتم عبر توثيق التوكن بالهيدرز وليس بإرسال اسم مستخدم نصي قابل للتخمين والتلاعب
        const res = await fetch('/api/get-gallery', {
            headers: { 'Authorization': `Bearer ${piAuthToken}` }
        });
        const images = await res.json();
        grid.innerHTML = '';
        if (!Array.isArray(images) || images.length === 0) {
            grid.innerHTML = `<div style="color:#777; padding:20px; grid-column: span 2; text-align:center;">${TRANSLATIONS[currentLang].noImages}</div>`;
            return;
        }

        images.forEach(img => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            const safeImgUrl = sanitizeUrl(img.url);
            
            div.innerHTML = `
                <img src="${safeImgUrl}" loading="lazy">
                <div class="gallery-actions">
                    <button class="g-btn g-down backend-down" type="button">${TRANSLATIONS[currentLang].download}</button>
                    <button class="g-btn g-del backend-del" type="button">${TRANSLATIONS[currentLang].delete}</button>
                </div>
            `;
            
            div.querySelector('.backend-down').onclick = () => forceDownload(safeImgUrl);
            div.querySelector('.backend-del').onclick = () => deleteImage(img.id, div);
            grid.appendChild(div);
        });
    } catch (e) {
        grid.innerHTML = `<div style="color:red; grid-column: span 2;">${TRANSLATIONS[currentLang].error}</div>`;
    }
}

async function deleteImage(imageId, element) {
    if (!confirm(TRANSLATIONS[currentLang].confirmDel)) return;
    element.style.opacity = '0.4';
    try {
        const res = await fetch('/api/delete-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${piAuthToken}` },
            body: JSON.stringify({ id: imageId })
        });
        if (res.ok) element.remove();
        else { alert(TRANSLATIONS[currentLang].error); element.style.opacity = '1'; }
    } catch(e) { console.error(e); element.style.opacity = '1'; }
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('#modelMenu') && !e.target.closest('.header-title-area')) {
        document.getElementById('modelMenu').style.display = 'none';
        document.getElementById('modelChevron').style.transform = 'rotate(0deg)';
    }
    if (!e.target.closest('#aspectMenu') && !e.target.closest('#aspectTriggerBtn')) {
        document.getElementById('aspectMenu').style.display = 'none';
    }
});

async function loadChatHistory() {
    if (!piAuthToken) return;
    const container = document.getElementById('chatContainer');
    const loadingDiv = document.createElement('div');
    loadingDiv.innerHTML = '<div style="text-align:center; color:#555; font-size:12px; margin:10px;">Loading data stream...</div>';
    container.appendChild(loadingDiv);

    try {
        // حماية IDOR: جلب التاريخ المحفوظ بشكل آمن تماماً
        const res = await fetch('/api/get-chat-history', {
            headers: { 'Authorization': `Bearer ${piAuthToken}` }
        });
        const historyData = await res.json();

        document.getElementById('emptyMsg').style.display = 'none';
        loadingDiv.remove();

        const list = Array.isArray(historyData) ? historyData : [];

        list.forEach(item => {
            if (item?.prompt) {
                addMessage(item.prompt, 'user');
                chatHistory.push({ role: "user", content: String(item.prompt) });
            }
            if (item?.type === 'text' && item?.bot_response) {
                addBotText(item.bot_response);
                chatHistory.push({ role: "assistant", content: String(item.bot_response) });
            } else if (item?.image_url || item?.imageUrl) {
                addBotImage(item.image_url || item.imageUrl, item.width, item.height);
            }
        });

        chatHistory = normalizeMessages(chatHistory).slice(-24);
        scrollToBottom();
    } catch (e) {
        console.error("History Stream Failed:", e);
        loadingDiv.innerHTML = '<div style="text-align:center; color:red; font-size:12px;">Failed to load sync memory</div>';
    }
}
</script>
